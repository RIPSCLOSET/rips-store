<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════════
     RIPS CLOSET — STOREFRONT (index.html)
     You should almost never need to edit this file.
     Prices, items, passwords, buttons, colors → edit products.js
     ═══════════════════════════════════════════════════════════════ -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIPS CLOSET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#3ddd00;           /* overwritten by products.js settings */
    --black:#060606;
    --card:#0d0d0d;
    --line:#1f1f1f;
    --dim:#9a9a9a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    background:var(--black);
    color:#f2f2f2;
    font-family:'Barlow Condensed',sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--green);color:#000}

  /* ── PASSWORD GATE ─────────────────────────────────────────── */
  #gate{
    position:fixed;inset:0;z-index:100;
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(61,221,0,.12), transparent 60%),
      var(--black);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  .gate-logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(64px,16vw,120px);
    line-height:.9;letter-spacing:.02em;color:#fff;
  }
  .gate-logo span{
    color:var(--green);
    text-shadow:0 0 24px rgba(61,221,0,.55), 0 0 70px rgba(61,221,0,.25);
  }
  .gate-sub{
    color:var(--dim);letter-spacing:.32em;font-size:13px;font-weight:600;
    margin:10px 0 40px;text-transform:uppercase;
  }
  .gate-box{width:100%;max-width:320px}
  .gate-box input{
    width:100%;padding:16px;text-align:center;
    background:#0c0c0c;border:1px solid #262626;border-radius:6px;
    color:#fff;font-family:'Barlow Condensed',sans-serif;
    font-size:20px;letter-spacing:.35em;text-transform:uppercase;outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .gate-box input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(61,221,0,.15)}
  .gate-box button{
    width:100%;margin-top:12px;padding:16px;
    background:var(--green);border:none;border-radius:6px;cursor:pointer;
    font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.12em;color:#031000;
    box-shadow:0 0 26px rgba(61,221,0,.35);
    transition:transform .12s, box-shadow .2s;
  }
  .gate-box button:hover{transform:translateY(-1px);box-shadow:0 0 40px rgba(61,221,0,.5)}
  #gateError{color:#ff5d5d;font-size:15px;letter-spacing:.1em;margin-top:14px;min-height:20px;font-weight:600}
  .gate-foot{position:absolute;bottom:26px;color:#4a4a4a;font-size:12px;letter-spacing:.28em;text-transform:uppercase}

  /* ── TICKER ────────────────────────────────────────────────── */
  .ticker{
    background:var(--green);color:#041000;overflow:hidden;white-space:nowrap;
    font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.18em;
    padding:7px 0;position:sticky;top:0;z-index:20;
  }
  .ticker-track{display:inline-block;animation:tick 22s linear infinite}
  @keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion: reduce){.ticker-track{animation:none}}

  /* ── HEADER ────────────────────────────────────────────────── */
  header{
    text-align:center;padding:54px 16px 8px;
    background:radial-gradient(ellipse 80% 100% at 50% -30%, rgba(61,221,0,.10), transparent 70%);
  }
  .logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(58px,13vw,110px);line-height:.9;color:#fff;
  }
  .logo span{color:var(--green);text-shadow:0 0 24px rgba(61,221,0,.5)}
  .tagline{color:var(--dim);letter-spacing:.3em;font-size:12px;font-weight:600;text-transform:uppercase;margin-top:10px}

  /* ── FILTER TABS ───────────────────────────────────────────── */
  .tabs{display:flex;justify-content:center;gap:8px;margin:30px 0 6px;flex-wrap:wrap;padding:0 16px}
  .tab{
    font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:.14em;
    color:var(--dim);background:transparent;border:1px solid #242424;border-radius:99px;
    padding:8px 22px;cursor:pointer;transition:all .15s;
  }
  .tab:hover{color:#fff;border-color:#3a3a3a}
  .tab.active{color:#041000;background:var(--green);border-color:var(--green)}

  /* ── PRODUCT GRID ──────────────────────────────────────────── */
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));
    gap:14px;padding:20px 16px 60px;max-width:1100px;margin:0 auto;
  }
  @media(min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:10px;
    overflow:hidden;display:flex;flex-direction:column;
    transition:transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover{transform:translateY(-3px);border-color:rgba(61,221,0,.55);box-shadow:0 8px 30px rgba(61,221,0,.10)}
  .imgwrap{position:relative;aspect-ratio:1/1;background:#101010}
  .imgwrap img{width:100%;height:100%;object-fit:cover;display:block}
  .card.sold .imgwrap img{filter:grayscale(1) brightness(.55)}
  .stamp{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;
  }
  .stamp b{
    font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:.22em;
    color:#ff3b3b;border:3px solid #ff3b3b;border-radius:6px;padding:4px 16px 2px;
    transform:rotate(-14deg);background:rgba(6,6,6,.55);
  }
  .info{padding:12px 12px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .name{font-size:18px;font-weight:600;letter-spacing:.02em;line-height:1.15}
  .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .price{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--green);letter-spacing:.04em}
  .chip{
    font-size:12.5px;font-weight:600;letter-spacing:.08em;color:#cfcfcf;
    border:1px solid #2c2c2c;border-radius:99px;padding:2px 10px;text-transform:uppercase;
  }
  .buy{
    margin-top:auto;display:block;text-align:center;text-decoration:none;
    font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.12em;
    padding:12px 8px 10px;border-radius:7px;transition:all .15s;
  }
  .buy.live{background:var(--green);color:#041000;box-shadow:0 0 18px rgba(61,221,0,.22)}
  .buy.live:hover{box-shadow:0 0 30px rgba(61,221,0,.45);transform:translateY(-1px)}
  .buy.out{background:transparent;color:var(--green);border:1px solid rgba(61,221,0,.6)}
  .buy.out:hover{background:rgba(61,221,0,.1)}

  .empty{grid-column:1/-1;text-align:center;color:var(--dim);padding:70px 20px;font-size:19px;letter-spacing:.06em}

  /* ── FOOTER ────────────────────────────────────────────────── */
  footer{
    border-top:1px solid var(--line);padding:34px 16px 44px;text-align:center;
    color:#5c5c5c;font-size:13px;letter-spacing:.24em;text-transform:uppercase;line-height:2.1;
  }
  footer a{color:var(--green);text-decoration:none}
  .hidden{display:none !important}
</style>
</head>
<body>

  <!-- ═══ PASSWORD GATE ═══ -->
  <div id="gate">
    <div class="gate-logo">RIPS <span>CLOSET</span></div>
    <div class="gate-sub">Members Only</div>
    <div class="gate-box">
      <input id="gateInput" type="password" placeholder="PASSWORD" autocomplete="off">
      <button id="gateBtn">ENTER THE CLOSET</button>
      <div id="gateError"></div>
    </div>
    <div class="gate-foot">No password? Hit us on Snap — ripscloset</div>
  </div>

  <!-- ═══ THE STORE ═══ -->
  <div id="store" class="hidden">
    <div class="ticker"><div class="ticker-track" id="ticker"></div></div>

    <header>
      <div class="logo">RIPS <span>CLOSET</span></div>
      <div class="tagline" id="tagline"></div>
    </header>

    <div class="tabs">
      <button class="tab active" data-filter="all">ALL</button>
      <button class="tab" data-filter="live">IN STOCK</button>
      <button class="tab" data-filter="sold">SOLD</button>
    </div>

    <main class="grid" id="grid"></main>

    <footer>
      RIPS CLOSET — LOCAL MEETUPS ONLY · CASH ONLY · NO ONLINE SALES<br>
      <a id="footSnap" href="#" target="_blank" rel="noopener">👻 ADD US ON SNAP → RIPSCLOSET</a>
    </footer>
  </div>

<!-- products.js holds ALL your items + settings -->
<script src="products.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   STOREFRONT LOGIC — you don't need to edit anything below.
   ═══════════════════════════════════════════════════════════════ */

// Apply colors from SETTINGS so a color swap in products.js re-themes everything
document.documentElement.style.setProperty('--green', SETTINGS.COLOR_GREEN);
document.documentElement.style.setProperty('--black', SETTINGS.COLOR_BLACK);

// ── Password gate ──
const gate = document.getElementById('gate');
const storeEl = document.getElementById('store');
function unlock(){ gate.classList.add('hidden'); storeEl.classList.remove('hidden'); }
if (sessionStorage.getItem('rips_unlocked') === 'yes') unlock();

function tryPassword(){
  const val = document.getElementById('gateInput').value.trim();
  if (val.toUpperCase() === SETTINGS.SITE_PASSWORD.toUpperCase()){
    sessionStorage.setItem('rips_unlocked','yes');
    unlock();
  } else {
    document.getElementById('gateError').textContent = 'WRONG PASSWORD — HIT US ON SNAP';
    document.getElementById('gateInput').value = '';
  }
}
document.getElementById('gateBtn').addEventListener('click', tryPassword);
document.getElementById('gateInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryPassword(); });

// ── Ticker + tagline + snap links ──
document.getElementById('ticker').textContent = (' ' + SETTINGS.TICKER_TEXT + ' ').repeat(8);
document.getElementById('tagline').textContent = SETTINGS.TAGLINE;
document.getElementById('footSnap').href = SETTINGS.SNAP_LINK;

// ── Build product cards ──
const grid = document.getElementById('grid');
function render(filter){
  grid.innerHTML = '';
  const list = PRODUCTS.filter(p =>
    filter === 'all' ? true : filter === 'sold' ? p.soldOut : !p.soldOut
  );
  if (!list.length){
    grid.innerHTML = '<div class="empty">Nothing here right now — check back soon or hit the Snap 👻</div>';
    return;
  }
  for (const p of list){
    const card = document.createElement('div');
    card.className = 'card' + (p.soldOut ? ' sold' : '');
    const chips =
      (p.size ? `<span class="chip">${p.size}</span>` : '') +
      (p.condition ? `<span class="chip">${p.condition}</span>` : '');
    card.innerHTML = `
      <div class="imgwrap">
        <img src="${p.image}" alt="${p.name}" loading="lazy"
             onerror="this.style.display='none'">
        ${p.soldOut ? '<div class="stamp"><b>SOLD OUT</b></div>' : ''}
      </div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="meta"><span class="price">${p.price}</span>${chips}</div>
        <a class="buy ${p.soldOut ? 'out' : 'live'}" href="${SETTINGS.SNAP_LINK}" target="_blank" rel="noopener">
          ${p.soldOut ? '🔔 ' + SETTINGS.SOLDOUT_BUTTON_TEXT : '👻 ' + SETTINGS.BUY_BUTTON_TEXT}
        </a>
      </div>`;
    grid.appendChild(card);
  }
}
render('all');

// ── Filter tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render(tab.dataset.filter);
  });
});
</script>
</body>
</html>
